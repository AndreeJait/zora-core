services:
  zora-core:
    image: ghcr.io/andreejait/zora-core:latest
    container_name: zora-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_HTTP_PORT=8080
      # Database
      - DB_DSN=postgres://zora:zora_secret@postgres:5432/zora_core?sslmode=disable
      # Redis
      - REDIS_ADDRESS=redis:6379
      # LLM
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3:14b
      - LLM_EMBED_MODEL=nomic-embed-text:latest
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_API_KEY=${OLLAMA_API_KEY}
      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      # MCP Server
      - MCP_SERVER_BASE_URL=http://zora-mcp-server:8080
      - MCP_SERVER_API_KEY=${MCP_API_KEY}
      # Knowledge
      - KNOWLEDGE_BASE_URL=http://zora-knowledge:8001
      # WAHA
      - WAHA_BASE_URL=https://waha.kooramaimmanuel.my.id
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_SESSION=default
      # NSQ
      - NSQ_NSQD_ADDR=nsqd:4150
      - NSQ_LOOKUPD_ADDRS_0=nsqlookupd:4160
      - NSQ_CHANNEL=zora-worker
      # Admin chat ID for failure notifications
      - WAHA_ADMIN_CHAT_ID=${WAHA_ADMIN_CHAT_ID}
      # API Key for protected endpoints
      - HTTP_API_KEY=${CORE_API_KEY}
    volumes:
      - ../files/config/app.yaml:/app/files/config/app.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nsqd:
        condition: service_started

  zora-worker:
    image: ghcr.io/andreejait/zora-core:latest
    container_name: zora-worker
    restart: unless-stopped
    entrypoint: ["/app/worker"]
    command: ["--config", "/app/files/config/app.yaml"]
    environment:
      - APP_ENV=production
      # Database
      - DB_DSN=postgres://zora:zora_secret@postgres:5432/zora_core?sslmode=disable
      # Redis
      - REDIS_ADDRESS=redis:6379
      # LLM
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3:14b
      - LLM_EMBED_MODEL=nomic-embed-text:latest
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_API_KEY=${OLLAMA_API_KEY}
      # MCP Server
      - MCP_SERVER_BASE_URL=http://zora-mcp-server:8080
      - MCP_SERVER_API_KEY=${MCP_API_KEY}
      # Knowledge
      - KNOWLEDGE_BASE_URL=http://zora-knowledge:8001
      # WAHA
      - WAHA_BASE_URL=https://waha.kooramaimmanuel.my.id
      - WAHA_API_KEY=${WAHA_API_KEY}
      # NSQ
      - NSQ_NSQD_ADDR=nsqd:4150
      - NSQ_LOOKUPD_ADDRS_0=nsqlookupd:4160
      - NSQ_CHANNEL=zora-worker
      # Task config
      - TASK_WORKER_COUNT=5
      - TASK_CHANNEL_SIZE=1000
      - TASK_WORKER_TIMEOUT=5m
      - TASK_DEFAULT_MAX_RETRY=3
      - TASK_DEFAULT_RETRY_DELAY=30s
    volumes:
      - ../files/config/app.yaml:/app/files/config/app.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nsqd:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    container_name: zora-core-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zora
      - POSTGRES_PASSWORD=zora_secret
      - POSTGRES_DB=zora_core
    ports:
      - "5434:5432"
    volumes:
      - core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zora -d zora_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zora-core-redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - core_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: zora-core-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - core_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  nsqlookupd:
    image: nsqio/nsq:v1.3.0
    container_name: zora-nsqlookupd
    restart: unless-stopped
    command: /nsqlookupd
    ports:
      - "4160:4160"
      - "4161:4161"

  nsqd:
    image: nsqio/nsq:v1.3.0
    container_name: zora-nsqd
    restart: unless-stopped
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160 --broadcast-address=nsqd --data-path=/data
    ports:
      - "4150:4150"
      - "4151:4151"
    volumes:
      - core_nsq_data:/data
    depends_on:
      - nsqlookupd

  nsqadmin:
    image: nsqio/nsq:v1.3.0
    container_name: zora-nsqadmin
    restart: unless-stopped
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    ports:
      - "4171:4171"
    depends_on:
      - nsqlookupd
      - nsqd

volumes:
  core_postgres_data:
  core_redis_data:
  core_minio_data:
  core_nsq_data:
